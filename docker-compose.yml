services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/ssl:ro
      - ./Happy-birthDay-improved:/usr/share/nginx/html/birthday:ro
    networks:
      - openclaw-net
    depends_on:
      - openclaw-gateway
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    expose:
      - "18789"
    networks:
      - openclaw-net
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - PUPPETEER_EXECUTABLE_PATH=/usr/lib/chromium/chromium
    volumes:
      - ./config:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
      - /usr/bin/chromium:/usr/bin/chromium:ro
      - /usr/lib/chromium:/usr/lib/chromium:ro
      - /usr/share/chromium:/usr/share/chromium:ro
      - /etc/chromium.d:/etc/chromium.d:ro
      - /lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu:ro
      - /usr/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  openclaw-net:
    driver: bridge
